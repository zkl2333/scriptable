<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Scriptable Widget Preview</title>
    <link rel="stylesheet" href="./.preview-assets/app.css" />
  </head>
  <body>
    <main class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow">SCRIPTABLE / WEB RUNTIME</p>
          <h1>Widget Preview</h1>
        </div>
        <div class="runtime-state" id="runtime-state" aria-live="polite"></div>
      </header>

      <section class="controls" aria-label="Preview controls">
        <label class="field">
          <span>Family</span>
          <select id="family-select">
            <option value="small">Small</option>
            <option value="medium">Medium</option>
            <option value="large">Large</option>
            <option value="accessoryInline">Accessory Inline</option>
            <option value="accessoryCircular">Accessory Circular</option>
            <option value="accessoryRectangular">Accessory Rectangular</option>
          </select>
        </label>
        <div class="field">
          <span>Appearance</span>
          <div class="segmented" role="group" aria-label="Appearance">
            <button type="button" data-scheme="light">Light</button>
            <button type="button" data-scheme="dark">Dark</button>
          </div>
        </div>
        <label class="field zoom-field">
          <span>Zoom <output id="zoom-output" for="zoom-range">125%</output></span>
          <input id="zoom-range" type="range" min="75" max="175" step="25" value="125" />
        </label>
      </section>

      <section class="preview-layout" aria-label="Widget preview">
        <div class="preview-surface" id="preview-surface"></div>
        <aside class="inspector">
          <section>
            <div class="panel-heading">
              <h2>Diagnostics</h2>
              <span class="count" id="diagnostic-count">0</span>
            </div>
            <ul class="diagnostics" id="diagnostics"></ul>
          </section>
          <section>
            <div class="panel-heading">
              <h2>Node Tree</h2>
            </div>
            <pre class="node-tree" id="node-tree"></pre>
          </section>
        </aside>
      </section>
    </main>
    <script type="module" src="./.preview-assets/app.js"></script>
  </body>
</html>
